ch: 6
nc: 1 # number of classes
scales: # model compound scaling constants, i.e. 'model=yolo11n.yaml' will call yolo11.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLO12 RGB-IR base + P3 SAAF small-object enhancement.
backbone:
  # [from, repeats, module, args]
  - [-1, 1, IN, []]  # 0
  - [-1, 1, Multiin, [1]]  # 1 visible
  - [-2, 1, Multiin, [2]]  # 2 infrared

  # two stream backbone
  - [1, 1, Conv, [64, 3, 2]]  # 3-P1/2
  - [-1, 1, Conv, [128, 3, 2, 1, 2]]  # 4-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]  # 5
  - [2, 1, Conv, [64, 3, 2]]  # 6-P1/2
  - [-1, 1, Conv, [128, 3, 2, 1, 2]]  # 7-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]  # 8

  - [-4, 1, Conv, [256, 3, 2, 1, 4]]  # 9-P3/8 visible
  - [-2, 1, Conv, [256, 3, 2, 1, 4]]  # 10-P3/8 infrared
  - [-2, 2, C3k2, [512, False, 0.25]]  # 11
  - [-1, 1, Conv, [512, 3, 2]]  # 12 P4
  - [-3, 2, C3k2, [512, False, 0.25]]  # 13
  - [-1, 1, Conv, [512, 3, 2]]  # 14
  - [-3, 4, A2C2f, [512, True, 4]]  # 15
  - [-1, 1, Conv, [1024, 3, 2]]  # 16 P5
  - [-1, 4, A2C2f, [1024, True, 1]]  # 17
  - [-4, 4, A2C2f, [512, True, 4]]  # 18
  - [-1, 1, Conv, [1024, 3, 2]]  # 19
  - [-1, 4, A2C2f, [1024, True, 1]]  # 20

  - [[11, 13], 1, Concat, [1]]  # 21 P3
  - [[15, 18], 1, Concat, [1]]  # 22 P4
  - [[17, 20], 1, Concat, [1]]  # 23 P5

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 24
  - [[-1, 22], 1, Concat, [1]]  # 25 cat backbone P4
  - [-1, 2, A2C2f, [512, False, -1]]  # 26

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 27
  - [[-1, 21], 1, Concat, [1]]  # 28 cat backbone P3
  - [-1, 2, A2C2f, [256, False, -1]]  # 29 P3 refined
  - [-1, 1, SAAF, [0.25]]  # 30 P3 small-object focus

  - [-1, 1, Conv, [256, 3, 2]]  # 31
  - [[-1, 26], 1, Concat, [1]]  # 32 cat head P4
  - [-1, 2, A2C2f, [512, False, -1]]  # 33

  - [-1, 1, Conv, [512, 3, 2]]  # 34
  - [[-1, 23], 1, Concat, [1]]  # 35 cat head P5
  - [-1, 2, C3k2, [1024, True]]  # 36

  - [[30, 33, 36], 1, Detect, [nc]]  # Detect(P3, P4, P5)
