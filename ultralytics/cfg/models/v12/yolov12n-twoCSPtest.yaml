ch: 6
nc: 6 # number of classes
scales: # model compound scaling constants, i.e. 'model=yolo11n.yaml' will call yolo11.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024] # summary: 319 layers, 2624080 parameters, 2624064 gradients, 6.6 GFLOPs
  s: [0.50, 0.50, 1024] # summary: 319 layers, 9458752 parameters, 9458736 gradients, 21.7 GFLOPs
  m: [0.50, 1.00, 512] # summary: 409 layers, 20114688 parameters, 20114672 gradients, 68.5 GFLOPs
  l: [1.00, 1.00, 512] # summary: 631 layers, 25372160 parameters, 25372144 gradients, 87.6 GFLOPs
  x: [1.00, 1.50, 512] # summary: 631 layers, 56966176 parameters, 56966160 gradients, 196.0 GFLOPs

# YOLO11n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, IN, []]  # 0
  - [-1, 1, Multiin, [1]]  # 1     可见光
  - [-2, 1, Multiin, [2]]  # 2     红外

  # two stream backbone
  # Visible branch
  - [1, 1, Conv, [64, 3, 2]] # 3-P1/2
  - [-1, 1,  DynamicFilterBlock, [ 64 ] ]  # 4 - 自动适应输入通道数
  - [-1, 1, Conv,  [128, 3, 2, 1, 2]] # 5-P2/4
  - [-1, 2, C3k2,  [256, False, 0.25]]  # 6
  # Infrared branch
  - [2, 1, Conv, [64, 3, 2 ] ] # 7-P1/2
  - [ -1, 1, DynamicFilterBlock, [ 64 ] ]  # 8 - 自动适应输入通道数
  - [-1, 1, Conv,  [128, 3, 2, 1, 2]] # 9-P2/4
  - [-1, 2, C3k2,  [256, False, 0.25]]  # 10

  - [-5, 1, Conv,  [256, 3, 2, 1, 4]] # 11-P3/8
  - [-2, 1, Conv,  [256, 3, 2, 1, 4]] # 12-P3/8  # infrared

  - [-2, 2, C3k2,  [512, False, 0.25]] #13
  - [-1, 1, Conv,  [512, 3, 2]] #14 P4
  - [-3, 2, C3k2,  [512, False, 0.25]] #15
  - [-1, 1, Conv,  [512, 3, 2]] #16

  - [-3, 4, A2C2f, [512, 512, 4, True, 4]] #17
  - [-1, 1, Conv,  [1024, 3, 2]] # 18 P5
  - [-1, 4, A2C2f, [1024, 1024, 4, True, 1]] # 19
  - [-4, 4, A2C2f, [512, 512, 4, True, 4]] #20
  - [-1, 1, Conv,  [1024, 3, 2]] # 21
  - [-1, 4, A2C2f, [1024, 1024, 4, True, 1]] # 22

  - [[6,10], 1, Concat, [1]]  # 23
  - [ -1, 1, GLFA, [ 256 ] ]  # 24 - 使用GLFA处理融合特征，降维到512通道
  - [[13, 15], 1, Concat, [1]]  # 25 p3
  - [ -1, 1, GLFA, [ 512 ] ]  # 26 - 使用GLFA处理融合特征，降维到512通道
  - [[17, 20], 1, Concat, [1]]  # 27 p4
  - [ -1, 1, GLFA, [ 1024 ] ]  # 28 - 使用GLFA处理融合特征，降维到512通道
  - [[19, 22], 1, Concat, [1]]  # 29 p5
  - [ -1, 1, GLFA, [ 2048 ] ]  # 30 - 使用GLFA处理融合特征，降维到512通道

# YOLO12-turbo head
head:
  # P5 -> P4
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] #31
  - [[-1, 28], 1, Concat, [1]] # cat backbone P4 32
  - [-1, 2, A2C2f, [512, False, -1]] #  33

  # P4 -> P3
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] #34
  - [[-1, 26], 1, Concat, [1]] # cat backbone P3 35
  - [-1, 2, A2C2f, [256, False, -1]] #  36

  # P3 -> P2
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] #37
  - [[-1, 24], 1, Concat, [1]] # cat backbone P2 #38
  - [-1, 2, A2C2f, [256, False, -1]] # 39

  # P2 -> P3
  - [-1, 1, Conv, [256, 3, 2]] #40
  - [[-1, 36], 1, Concat, [1]] # cat head P3 #41
  - [-1, 2, A2C2f, [512, False, -1]] # 42

  # P3 -> P4
  - [-1, 1, Conv, [512, 3, 2]] #43
  - [[-1, 33], 1, Concat, [1]] # cat head P4 #44
  - [-1, 2, A2C2f, [1024, False, -1]] # 45

  # P4 -> P5
  - [-1, 1, Conv, [1024, 3, 2]] #46
  - [[-1, 30], 1, Concat, [1]] # cat head P5 #47
  - [-1, 2, A2C2f, [1024, False, -1]] # 48

  - [[39, 42, 45, 48], 1, Detect, [nc]] # Detect(P2, P3, P4, P5)