ch: 6
nc: 1 # number of classes
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLO12 RGB-IR base + P2 detail injection + P3 HCFM.
# It does not add a P2 detection head. Instead, shallow P2 RGB/IR details are downsampled and injected into P3.
backbone:
  - [-1, 1, IN, []]  # 0
  - [-1, 1, Multiin, [1]]  # 1 visible
  - [-2, 1, Multiin, [2]]  # 2 infrared

  # two-stream shallow features
  - [1, 1, Conv, [64, 3, 2]]  # 3-P1/2 visible
  - [-1, 1, Conv, [128, 3, 2, 1, 2]]  # 4-P2/4 visible
  - [-1, 2, C3k2, [256, False, 0.25]]  # 5 P2 visible detail
  - [2, 1, Conv, [64, 3, 2]]  # 6-P1/2 infrared
  - [-1, 1, Conv, [128, 3, 2, 1, 2]]  # 7-P2/4 infrared
  - [-1, 2, C3k2, [256, False, 0.25]]  # 8 P2 infrared detail

  - [-4, 1, Conv, [256, 3, 2, 1, 4]]  # 9-P3/8 visible
  - [-2, 1, Conv, [256, 3, 2, 1, 4]]  # 10-P3/8 infrared
  - [-2, 2, C3k2, [512, False, 0.25]]  # 11
  - [-1, 1, Conv, [512, 3, 2]]  # 12 P4
  - [-3, 2, C3k2, [512, False, 0.25]]  # 13
  - [-1, 1, Conv, [512, 3, 2]]  # 14
  - [-3, 4, A2C2f, [512, True, 4]]  # 15
  - [-1, 1, Conv, [1024, 3, 2]]  # 16 P5
  - [-1, 4, A2C2f, [1024, True, 1]]  # 17
  - [-4, 4, A2C2f, [512, True, 4]]  # 18
  - [-1, 1, Conv, [1024, 3, 2]]  # 19
  - [-1, 4, A2C2f, [1024, True, 1]]  # 20

  - [[11, 13], 1, Concat, [1]]  # 21 P3 fused backbone
  - [[15, 18], 1, Concat, [1]]  # 22 P4 fused backbone
  - [[17, 20], 1, Concat, [1]]  # 23 P5 fused backbone

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 24 P5->P4
  - [[-1, 22], 1, Concat, [1]]  # 25
  - [-1, 2, A2C2f, [512, False, -1]]  # 26 refined P4

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 27 P4->P3
  - [[-1, 21], 1, Concat, [1]]  # 28
  - [-1, 2, A2C2f, [256, False, -1]]  # 29 refined P3

  # P2-to-P3 detail injection: use shallow RGB/IR details without adding a P2 detection head.
  - [[5, 8], 1, Concat, [1]]  # 30 P2 RGB/IR detail
  - [-1, 1, Conv, [256, 3, 2]]  # 31 downsample P2 detail to P3 scale
  - [-1, 1, HCFM, [0.25, 0.25]]  # 32 high-frequency contextual detail prior
  - [[29, 32], 1, FeatureAdd, []]  # 33 inject detail prior into P3
  - [-1, 1, HCFM, [0.25, 0.25]]  # 34 P3 small-object focus

  - [-1, 1, Conv, [256, 3, 2]]  # 35 P3->P4
  - [[-1, 26], 1, Concat, [1]]  # 36
  - [-1, 2, A2C2f, [512, False, -1]]  # 37 refined P4 out

  - [-1, 1, Conv, [512, 3, 2]]  # 38 P4->P5
  - [[-1, 23], 1, Concat, [1]]  # 39
  - [-1, 2, C3k2, [1024, True]]  # 40 refined P5 out

  - [[34, 37, 40], 1, Detect, [nc]]  # Detect(P3, P4, P5)
