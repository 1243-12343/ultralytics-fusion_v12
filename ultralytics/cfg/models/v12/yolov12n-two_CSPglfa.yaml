ch: 6
nc: 1 # number of classes
scales: # model compound scaling constants, i.e. 'model=yolo11n.yaml' will call yolo11.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024] # summary: 319 layers, 2624080 parameters, 2624064 gradients, 6.6 GFLOPs
  s: [0.50, 0.50, 1024] # summary: 319 layers, 9458752 parameters, 9458736 gradients, 21.7 GFLOPs
  m: [0.50, 1.00, 512] # summary: 409 layers, 20114688 parameters, 20114672 gradients, 68.5 GFLOPs
  l: [1.00, 1.00, 512] # summary: 631 layers, 25372160 parameters, 25372144 gradients, 87.6 GFLOPs
  x: [1.00, 1.50, 512] # summary: 631 layers, 56966176 parameters, 56966160 gradients, 196.0 GFLOPs

# YOLO11n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, IN, []]  # 0
  - [-1, 1, Multiin, [1]]  # 1     可见光
  - [-2, 1, Multiin, [2]]  # 2     红外

  # two stream backbone
  # Visible branch
  - [1, 1, Conv, [64, 3, 2]] # 3-P1/2
  - [-1, 1, Conv,  [128, 3, 2, 1, 2]] # 4-P2/4
  - [-1, 2, C3k2,  [256, False, 0.25]] # 5
  # Infrared branch
  - [2, 1, Conv, [64, 3, 2 ] ] # 6-P1/2
  - [-1, 1, Conv,  [128, 3, 2, 1, 2]] # 7-P2/4
  - [-1, 2, C3k2,  [256, False, 0.25]] # 8

  - [-4, 1, Conv,  [256, 3, 2, 1, 4]] # 9-P3/8
  - [-2, 1, Conv,  [256, 3, 2, 1, 4]] # 10-P3/8  # infrared

  - [-2, 2, C3k2,  [512, False, 0.25]] #11
  - [-1, 1, Conv,  [512, 3, 2]] #12
  - [-3, 2, C3k2,  [512, False, 0.25]] #13
  - [-1, 1, Conv,  [512, 3, 2]] #14

  - [-3, 4, A2C2f, [512, True, 4]] #15
  - [-1, 1, Conv,  [1024, 3, 2]] # 16
  - [-1, 4, A2C2f, [1024, True, 1]] # 17
  - [-4, 4, A2C2f, [512, True, 4]] #18
  - [-1, 1, Conv,  [1024, 3, 2]] # 19
  - [-1, 4, A2C2f, [1024, True, 1]] # 20

  # 双流特征融合点，添加GLFA
  - [[11, 13], 1, Concat, [1]]  # 21 - P3/P4融合 (512+512=1024通道)
  - [-1, 1, GLFA, [512]]  # 22 - 使用GLFA处理融合特征，降维到512通道
  
  - [[15, 18], 1, Concat, [1]]  # 23 - P4融合 (512+512=1024通道)
  - [-1, 1, GLFA, [1024]]  # 24 - 使用GLFA处理融合特征，降维到512通道
  
  - [[17, 20], 1, Concat, [1]]  # 25 - P5融合 (1024+1024=2048通道)
  - [-1, 1, GLFA, [2048]]  # 26 - 使用GLFA处理融合特征，降维到1024通道

# YOLO12-turbo head
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 24], 1, Concat, [1]] # cat backbone P4 (注意：引用层号改为24)
  - [-1, 2, A2C2f, [512, False, -1]]

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 22], 1, Concat, [1]] # cat backbone P3 (注意：引用层号改为22)
  - [-1, 2, A2C2f, [256, False, -1]]

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 29], 1, Concat, [1]] # cat head P4 (注意：层号需要相应调整)
  - [-1, 2, A2C2f, [512, False, -1]]

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 26], 1, Concat, [1]] # cat head P5 (注意：引用层号改为26)
  - [-1, 2, C3k2, [1024, True]]

  - [[32, 35, 38], 1, Detect, [nc]] # Detect(P3, P4, P5) (注意：层号需要相应调整)