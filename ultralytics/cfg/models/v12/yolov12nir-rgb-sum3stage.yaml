ch: 6
nc: 1 # number of classes
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# Basic fusion ablation: element-wise sum fusion at P3/P4/P5.
backbone:
  - [-1, 1, IN, []]  # 0
  - [-1, 1, Multiin, [1]]  # 1 VIS
  - [-2, 1, Multiin, [2]]  # 2 IR
  - [1, 1, Conv, [64, 3, 2]]  # 3
  - [-1, 1, C3k2, [64, False, 0.25]]  # 4
  - [2, 1, Conv, [64, 3, 2]]  # 5
  - [-1, 1, C3k2, [64, False, 0.25]]  # 6
  - [4, 1, Conv, [128, 3, 2]]  # 7
  - [-1, 2, C3k2, [128, False, 0.25]]  # 8
  - [6, 1, Conv, [128, 3, 2]]  # 9
  - [-1, 2, C3k2, [128, False, 0.25]]  # 10
  - [8, 1, Conv, [256, 3, 2]]  # 11
  - [-1, 2, C3k2, [256, False, 0.25]]  # 12
  - [10, 1, Conv, [256, 3, 2]]  # 13
  - [-1, 2, C3k2, [256, False, 0.25]]  # 14
  - [[12, 14], 1, FeatureAdd, []]  # 15 fused P3
  - [[12, 15], 1, FeatureAdd, []]  # 16
  - [[14, 15], 1, FeatureAdd, []]  # 17
  - [16, 1, Conv, [512, 3, 2]]  # 18
  - [-1, 2, C3k2, [512, False, 0.25]]  # 19
  - [17, 1, Conv, [512, 3, 2]]  # 20
  - [-1, 2, C3k2, [512, False, 0.25]]  # 21
  - [[19, 21], 1, FeatureAdd, []]  # 22 fused P4
  - [[19, 22], 1, FeatureAdd, []]  # 23
  - [[21, 22], 1, FeatureAdd, []]  # 24
  - [23, 1, Conv, [1024, 3, 2]]  # 25
  - [-1, 2, A2C2f, [1024, True, 1]]  # 26
  - [24, 1, Conv, [1024, 3, 2]]  # 27
  - [-1, 2, A2C2f, [1024, True, 1]]  # 28
  - [[26, 28], 1, FeatureAdd, []]  # 29 fused P5

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 30
  - [[-1, 22], 1, Concat, [1]]  # 31
  - [-1, 2, A2C2f, [512, False, -1]]  # 32
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 33
  - [[-1, 15], 1, Concat, [1]]  # 34
  - [-1, 2, A2C2f, [256, False, -1]]  # 35
  - [-1, 1, Conv, [256, 3, 2]]  # 36
  - [[-1, 32], 1, Concat, [1]]  # 37
  - [-1, 2, A2C2f, [512, False, -1]]  # 38
  - [-1, 1, Conv, [512, 3, 2]]  # 39
  - [[-1, 29], 1, Concat, [1]]  # 40
  - [-1, 2, C3k2, [1024, True]]  # 41
  - [[35, 38, 41], 1, Detect, [nc]]
