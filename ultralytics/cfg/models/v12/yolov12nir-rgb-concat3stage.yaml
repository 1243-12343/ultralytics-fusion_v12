ch: 6
nc: 1 # number of classes
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# Ablation of yolov12nir-rgb-ffm3stage.yaml:
# replace each FFM with simple Concat + 1x1 Conv fusion.
backbone:
  - [-1, 1, IN, []]  # 0
  - [-1, 1, Multiin, [1]]  # 1 VIS
  - [-2, 1, Multiin, [2]]  # 2 IR

  - [1, 1, Conv, [64, 3, 2]]  # 3 VIS P1/2
  - [-1, 1, C3k2, [64, False, 0.25]]  # 4
  - [2, 1, Conv, [64, 3, 2]]  # 5 IR P1/2
  - [-1, 1, C3k2, [64, False, 0.25]]  # 6

  - [4, 1, Conv, [128, 3, 2]]  # 7 VIS P2/4
  - [-1, 2, C3k2, [128, False, 0.25]]  # 8
  - [6, 1, Conv, [128, 3, 2]]  # 9 IR P2/4
  - [-1, 2, C3k2, [128, False, 0.25]]  # 10

  - [8, 1, Conv, [256, 3, 2]]  # 11 VIS P3/8
  - [-1, 2, C3k2, [256, False, 0.25]]  # 12 VIS P3
  - [10, 1, Conv, [256, 3, 2]]  # 13 IR P3/8
  - [-1, 2, C3k2, [256, False, 0.25]]  # 14 IR P3

  # Simple fusion #1 at P3: concat + 1x1 projection
  - [[12, 14], 1, Concat, [1]]  # 15
  - [-1, 1, Conv, [256, 1, 1]]  # 16 fused P3
  - [[12, 16], 1, FeatureAdd, []]  # 17 VIS + fusion1
  - [[14, 16], 1, FeatureAdd, []]  # 18 IR + fusion1

  - [17, 1, Conv, [512, 3, 2]]  # 19 VIS P4/16
  - [-1, 2, C3k2, [512, False, 0.25]]  # 20 VIS P4
  - [18, 1, Conv, [512, 3, 2]]  # 21 IR P4/16
  - [-1, 2, C3k2, [512, False, 0.25]]  # 22 IR P4

  # Simple fusion #2 at P4
  - [[20, 22], 1, Concat, [1]]  # 23
  - [-1, 1, Conv, [512, 1, 1]]  # 24 fused P4
  - [[20, 24], 1, FeatureAdd, []]  # 25 VIS + fusion2
  - [[22, 24], 1, FeatureAdd, []]  # 26 IR + fusion2

  - [25, 1, Conv, [1024, 3, 2]]  # 27 VIS P5/32
  - [-1, 2, A2C2f, [1024, True, 1]]  # 28 VIS P5
  - [26, 1, Conv, [1024, 3, 2]]  # 29 IR P5/32
  - [-1, 2, A2C2f, [1024, True, 1]]  # 30 IR P5

  # Simple fusion #3 at P5
  - [[28, 30], 1, Concat, [1]]  # 31
  - [-1, 1, Conv, [1024, 1, 1]]  # 32 fused P5

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 33 P5->P4
  - [[-1, 24], 1, Concat, [1]]  # 34
  - [-1, 2, A2C2f, [512, False, -1]]  # 35 refined P4

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 36 P4->P3
  - [[-1, 16], 1, Concat, [1]]  # 37
  - [-1, 2, A2C2f, [256, False, -1]]  # 38 refined P3

  - [-1, 1, Conv, [256, 3, 2]]  # 39 P3->P4
  - [[-1, 35], 1, Concat, [1]]  # 40
  - [-1, 2, A2C2f, [512, False, -1]]  # 41 refined P4 out

  - [-1, 1, Conv, [512, 3, 2]]  # 42 P4->P5
  - [[-1, 32], 1, Concat, [1]]  # 43
  - [-1, 2, C3k2, [1024, True]]  # 44 refined P5 out

  - [[38, 41, 44], 1, Detect, [nc]]  # Detect(P3, P4, P5)
